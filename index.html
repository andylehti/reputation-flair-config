    // --- Default Configuration ---
    const defaults = {

      enableHighTrafficMode: true,
      customBadTerms: [],

      streakMode: 'noexpire',

    // --- Helper Functions ---
    function cleanSubredditName(value) {
      return String(value ?? '').trim().replace(/^https?:\/\/(www\.)?reddit\.com\/r\//i, '').replace(/^r\//i, '').replace(/^\/r\//i, '').replace(/[^A-Za-z0-9_]/g, '');
    }

    // --- Helper Components ---
    const Toggle = ({ label, description, checked, onChange, disabled }) => (

            {opt.label}

    // --- Main Application ---
    function App() {
      const [config, setConfig] = useState(defaults);
      const [step, setStep] = useState(0);
      const [previewTone, setPreviewTone] = useState('good');
      const [copied, setCopied] = useState('');

      const update = (key, value) => {
        setConfig(prev => {
          const next = { ...prev, [key]: value };
          
          // Smart Disclosure Rules
          if (key === 'enableHumanVerification' && !value) {
            next.verificationRemovePostsUntilVerified = false;
            next.verificationRemoveCommentsUntilVerified = false;
            next.approveVerificationRemovedWhenVerified = false;
            next.enableHumanVerificationReminder = false;
            next.enableVerifyHumanMenu = false;
          } else if (key === 'enableHumanVerification' && value) {
            next.enableVerifyHumanMenu = true;
          }
          
          if (key === 'flairParts') {
            next.showPostCommentCount = value.includes('activity');
          }

          // Enforce Review/Removal Consistency Rules (snapping logic)
          if (key === 'enableReviewFilter' && value && next.enableRemoveFilter) {
            if (next.removeFilterMinBadPoints > 0 && next.removeFilterMinBadPoints < next.reviewFilterMinBadPoints) next.removeFilterMinBadPoints = next.reviewFilterMinBadPoints;
            if (next.removeFilterCategories > 0 && next.removeFilterCategories < next.reviewFilterCategories) next.removeFilterCategories = next.reviewFilterCategories;
          }
          if (key === 'enableRemoveFilter' && value && next.enableReviewFilter) {
            if (next.removeFilterMinBadPoints > 0 && next.removeFilterMinBadPoints < next.reviewFilterMinBadPoints) next.removeFilterMinBadPoints = next.reviewFilterMinBadPoints;
            if (next.removeFilterCategories > 0 && next.removeFilterCategories < next.reviewFilterCategories) next.removeFilterCategories = next.reviewFilterCategories;
          }
          if (key === 'reviewFilterMinBadPoints' && next.enableRemoveFilter && next.removeFilterMinBadPoints > 0 && next.removeFilterMinBadPoints < value) {
            next.removeFilterMinBadPoints = value;
          }
          if (key === 'reviewFilterCategories' && next.enableRemoveFilter && next.removeFilterCategories > 0 && next.removeFilterCategories < value) {
            next.removeFilterCategories = value;
          }

          return next;
        });
      };

      const toggleFlairPart = (part) => {
        const parts = new Set(config.flairParts);
        if (parts.has(part)) parts.delete(part);
        else parts.add(part);
        update('flairParts', Array.from(parts));
      };

      // Build dynamic steps array
      const steps = [
        { id: 'intro', icon: Shield, title: 'Welcome' },
        { id: 'flair', icon: Eye, title: 'The Look' },
        { id: 'scoring', icon: TrendingUp, title: 'Behavior' },
        { id: 'automod', icon: AlertTriangle, title: 'Moderation' },
        { id: 'verify', icon: UserCheck, title: 'Verification' },
      ];
      
      if (config.enableHumanVerification) {
        steps.push({ id: 'emoji', icon: ImageIcon, title: 'Badge Setup' });
      }
      
      steps.push({ id: 'export', icon: CheckCircle2, title: 'Finish' });

      // Handle potential step overflow when toggling features
      useEffect(() => {
        if (step >= steps.length) {
          setStep(steps.length - 1);
        }
      }, [steps.length, step]);

      const renderFlairPreview = () => {
        if (!config.enableFlairUpdates) {
          return (
            <div className="p-6 rounded-2xl border border-slate-700 bg-slate-900/50 text-center text-slate-500 italic">
              Flair updates are disabled. Users will not see anything.
            </div>
          );
        }

        const isGood = previewTone === 'good';
        const isBad = previewTone === 'bad';
        
        // Mock Data
        const rep = isGood ? '61%' : isBad ? '-23%' : '6%';
        const warn = isGood ? '4' : isBad ? '42' : '11';
        const activity = '148';
        const streak = isGood ? '💎26' : isBad ? '🔥3' : '💛12';
        
        const bgColor = config.colorFlairByReputation 
          ? (isGood ? 'bg-emerald-900/80 border-emerald-700/50' : isBad ? 'bg-red-900/80 border-red-700/50' : 'bg-yellow-900/80 border-yellow-700/50')
          : 'bg-slate-800 border-slate-600';

        const bits = [];
        if (config.flairParts.includes('streak')) bits.push(streak);
        if (config.flairParts.includes('head') && config.preserveCustomFlairText) bits.push('Existing Flair');
        
        const metrics = [];
        if (config.flairParts.includes('rep')) push(`⚖️ ${rep}`);
        if (config.flairParts.includes('warn')) push(`⚠️ ${warn}`);
        if (config.flairParts.includes('activity')) push(`⌨️ [${activity}]`);

        return (
          <div className="p-6 rounded-2xl border border-slate-700 bg-gradient-to-b from-slate-800 to-slate-900 shadow-xl">
            <div className="flex items-center gap-3 mb-6">
              <div className="w-10 h-10 rounded-full bg-gradient-to-br from-blue-400 to-indigo-600 shadow-inner"></div>
              <div className="flex flex-col items-start">
                <span className="font-bold text-slate-200 text-sm">u/ExampleUser</span>
                <div className={`mt-1 flex items-center px-3 py-1 rounded-full border text-xs font-semibold text-slate-100 shadow-sm ${bgColor}`}>
                  {bits.join(' · ')} {bits.length > 0 && metrics.length > 0 && ' ∣ '} {metrics.join(' ∣ ')}
                  {bits.length === 0 && metrics.length === 0 && <span className="opacity-50">No fields selected</span>}
                </div>
              </div>
            </div>
            
            <div className="flex justify-center gap-2 border-t border-slate-700/50 pt-4">
              {['good', 'neutral', 'bad'].map(tone => (
                <button
                  key={tone}
                  onClick={() => setPreviewTone(tone)}
                  className={`px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider transition-all ${previewTone === tone ? 'bg-slate-200 text-slate-900' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                >
                  {tone}
                </button>
              ))}
            </div>
          </div>
        );
      };

      const getStepContent = () => {
        switch (steps[step].id) {
          case 'intro':
            return (
              <div className="text-center space-y-6 py-8">
                <div className="w-20 h-20 bg-blue-500/20 text-blue-400 rounded-full flex items-center justify-center mx-auto mb-6">
                  <Shield size={40} />
                </div>
                <h2 className="text-3xl font-bold text-white">Reputation Flair</h2>
                <p className="text-lg text-slate-400 max-w-lg mx-auto leading-relaxed">
                  Build trust and accountability in your community. Track contribution quality over time, filter toxicity, and reward positive discourse.
                </p>
                <p className="text-slate-500 mb-8">Let's configure your bot in just a few clicks. No coding required.</p>

                <div className="max-w-md mx-auto text-left p-5 rounded-xl border border-slate-700 bg-slate-800/30">
                  <label className="font-semibold text-slate-100 block mb-2">Subreddit Name</label>
                  <input 
                    type="text" 
                    className="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm text-slate-200 focus:border-blue-500 focus:outline-none"
                    placeholder="example_subreddit"
                    value={config.subredditName}
                    onChange={(e) => {
                      const val = cleanSubredditName(e.target.value);
                      update('subredditName', val);
                    }}
                    autoCapitalize="off" 
                    autoComplete="off" 
                    spellCheck="false"
                  />
                  <p className="text-xs text-slate-400 mt-3 leading-snug">
                    We use this to generate the proper setup links for your community. Your final configuration can still be reused on any subreddit.
                  </p>
                </div>
              </div>
            );

          case 'flair':
            return (
              <div className="space-y-6">
                <div className="mb-8">
                  <h3 className="text-xl font-bold text-white mb-2">What do users see?</h3>
                  <p className="text-slate-400">Design the public badge that appears next to usernames.</p>
                </div>
                
                {renderFlairPreview()}

                <Toggle 
                  label="Enable Flair Updates" 
                  description="Turn this off if you want the bot to track scores silently without changing user flairs."
                  checked={config.enableFlairUpdates} 
                  onChange={(v) => update('enableFlairUpdates', v)} 
                />

                <div className={`space-y-4 transition-opacity ${config.enableFlairUpdates ? 'opacity-100' : 'opacity-50 pointer-events-none'}`}>
                  <div className="p-5 rounded-xl border border-slate-700 bg-slate-800/30">
                    <h4 className="font-semibold text-slate-200 mb-4">Visible Metrics</h4>
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                      {[
                        { id: 'streak', label: 'Streak Badge', icon: '💎' },
                        { id: 'rep', label: 'Reputation %', icon: '⚖️' },
                        { id: 'warn', label: 'Warning Count', icon: '⚠️' },
                        { id: 'activity', label: 'Total Activity', icon: '⌨️' },
                      ].map(part => (
                        <label key={part.id} className={`flex items-center gap-2 p-3 rounded-lg border cursor-pointer transition-colors ${config.flairParts.includes(part.id) ? 'bg-blue-500/20 border-blue-500/50 text-blue-100' : 'bg-slate-800 border-slate-700 text-slate-400 hover:bg-slate-700'}`}>
                          <input type="checkbox" className="sr-only" checked={config.flairParts.includes(part.id)} onChange={() => toggleFlairPart(part.id)} />
                          <span>{part.icon}</span> <span className="text-sm font-medium">{part.label}</span>
                        </label>
                      ))}
                    </div>
                  </div>

                  <div className="p-5 rounded-xl border border-slate-700 bg-slate-800/30">
                    <h4 className="font-semibold text-slate-200 mb-4">Streak Badge Thresholds (Days)</h4>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div>
                        <label className="text-sm text-slate-400 block mb-1">Regular Badge</label>
                        <input type="number" min={0} value={config.threshRegular} onChange={e => update('threshRegular', parseInt(e.target.value)||0)} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-200 focus:border-blue-500 focus:outline-none" />
                      </div>
                      <div>
                        <label className="text-sm text-slate-400 block mb-1">Pro Badge</label>
                        <input type="number" min={0} value={config.threshPro} onChange={e => update('threshPro', parseInt(e.target.value)||0)} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-200 focus:border-blue-500 focus:outline-none" />
                      </div>
                      <div>
                        <label className="text-sm text-slate-400 block mb-1">Elite Badge</label>
                        <input type="number" min={0} value={config.threshElite} onChange={e => update('threshElite', parseInt(e.target.value)||0)} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-200 focus:border-blue-500 focus:outline-none" />
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <Toggle label="Colorize by Reputation" description="Green for good, red for bad." checked={config.colorFlairByReputation} onChange={(v) => update('colorFlairByReputation', v)} />
                    <Toggle label="Preserve Existing Text" description="Keep their custom flair (if they have one)." checked={config.preserveCustomFlairText} onChange={(v) => { update('preserveCustomFlairText', v); if(v) { if(!config.flairParts.includes('head')) toggleFlairPart('head'); } else { if(config.flairParts.includes('head')) toggleFlairPart('head'); } }} />
                  </div>
                </div>
              </div>
            );

          case 'scoring':
            return (
              <div className="space-y-6">
                <div className="mb-8">
                  <h3 className="text-xl font-bold text-white mb-2">How do scores behave?</h3>
                  <p className="text-slate-400">Configure forgiveness, streaks, and protections.</p>
                </div>

                <div className="p-5 rounded-xl border border-slate-700 bg-slate-800/30 space-y-4">
                  <h4 className="font-semibold text-slate-200">Forgiveness (Negative Score Fade)</h4>
                  <p className="text-sm text-slate-400 mb-3">How fast should bad points decay for users who stay active?</p>
                  <RadioGroup 
                    selected={config.negativeScoreFade} 
                    onChange={(v) => update('negativeScoreFade', v)}
                    options={[
                      { value: 'off', label: 'Never fade' },
                      { value: 'low', label: 'Slow (~2%/wk)' },
                      { value: 'medium', label: 'Medium (~4%/wk)' },
                      { value: 'high', label: 'Fast (~6%/wk)' }
                    ]} 
                  />
                </div>

                <div className="p-5 rounded-xl border border-slate-700 bg-slate-800/30 space-y-4">
                  <h4 className="font-semibold text-slate-200">Streak Expiry</h4>
                  <p className="text-sm text-slate-400 mb-3">When should a user's participation streak reset to zero?</p>
                  <RadioGroup 
                    selected={config.streakMode} 
                    onChange={(v) => update('streakMode', v)}
                    options={[
                      { value: 'noexpire', label: 'Never expire' },
                      { value: 'hourly24', label: '48h without posting' },
                      { value: 'hourly48', label: '72h without posting' }
                    ]} 
                  />
                </div>

                <Toggle 
                  label="Protect Original Poster (OP) Replies" 
                  description="Comments made by the OP on their own post cannot earn negative points."
                  checked={config.protectOpSelfReplies} 
                  onChange={(v) => update('protectOpSelfReplies', v)} 
                />
                
                {config.protectOpSelfReplies && (
                  <div className="pl-6 border-l-2 border-blue-500/30 ml-4 animate-in fade-in slide-in-from-top-2">
                    <Slider 
                      label="Max Good Points per OP Reply" 
                      min={1} max={5} value={config.ownPostCommentGoodCap} 
                      onChange={(v) => update('ownPostCommentGoodCap', v)} 
                    />
                  </div>
                )}

                <div className="p-5 rounded-xl border border-slate-700 bg-slate-800/30">
                  <h4 className="font-semibold text-slate-200 mb-2">Custom Bad Terms</h4>
                  <p className="text-sm text-slate-400 mb-3">Add any extra terms specific to your subreddit that should trigger bad reputation. One term per line.</p>
                  <textarea
                    className="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm text-slate-200 focus:border-blue-500 focus:outline-none min-h-[100px]"
                    value={config.customBadTerms.join('\n')}
                    onChange={(e) => update('customBadTerms', e.target.value.split('\n').map(s => s.trim()).filter(Boolean))}
                    placeholder="gaslighter&#10;case closed&#10;low effort"
                  />
                </div>

                <Toggle 
                  label="High Traffic Mode" 
                  description="Reduces how often flair is rewritten so busy subreddits do fewer writes."
                  checked={config.enableHighTrafficMode} 
                  onChange={(v) => update('enableHighTrafficMode', v)} 
                />
              </div>
            );

          case 'automod':
            return (
              <div className="space-y-6">
                <div className="mb-8">
                  <h3 className="text-xl font-bold text-white mb-2">When do moderators step in?</h3>
                  <p className="text-slate-400">Automatically flag or remove highly toxic behavior.</p>
                </div>

                <div className="p-5 rounded-xl border border-slate-700 bg-slate-800/30">
                  <Toggle label="Enable Mod Queue Review" description="Send comments to the mod queue if they cross a threshold." checked={config.enableReviewFilter} onChange={(v) => update('enableReviewFilter', v)} />
                  
                  {config.enableReviewFilter && (
                    <div className="mt-6 space-y-4 animate-in fade-in pl-4 border-l-2 border-blue-500/30 ml-4">
                      <Slider label="Point Threshold" description="Trigger review if an item earns this many bad points. 0 turns this off." min={0} max={16} value={config.reviewFilterMinBadPoints} onChange={(v) => update('reviewFilterMinBadPoints', v)} />
                      <Slider label="Category Threshold" description="Trigger review if an item hits this many different toxicity categories. 0 turns this off." min={0} max={6} value={config.reviewFilterCategories} onChange={(v) => update('reviewFilterCategories', v)} />
                      
                      <div className="flex flex-col gap-3 pt-2">
                        <label className="flex items-center gap-3 text-sm text-slate-300 cursor-pointer hover:text-white transition-colors">
                          <input type="checkbox" checked={config.ignoreModerators} onChange={e => update('ignoreModerators', e.target.checked)} className="w-4 h-4 rounded border-slate-600 bg-slate-900 accent-blue-500" />
                          Ignore moderators from review
                        </label>
                        <label className="flex items-center gap-3 text-sm text-slate-300 cursor-pointer hover:text-white transition-colors">
                          <input type="checkbox" checked={config.ignoreApprovedUsers} onChange={e => update('ignoreApprovedUsers', e.target.checked)} className="w-4 h-4 rounded border-slate-600 bg-slate-900 accent-blue-500" />
                          Ignore approved users from review
                        </label>
                      </div>
                    </div>
                  )}
                </div>

                <div className="p-5 rounded-xl border border-slate-700 bg-slate-800/30">
                  <Toggle label="Enable Auto-Removal" description="Instantly remove content if it crosses a severe threshold." checked={config.enableRemoveFilter} onChange={(v) => update('enableRemoveFilter', v)} />
                  
                  {config.enableRemoveFilter && (
                    <div className="mt-6 space-y-4 animate-in fade-in pl-4 border-l-2 border-blue-500/30 ml-4">
                      <Slider 
                        label="Point Threshold" 
                        description={config.enableReviewFilter ? `Must be 0 (off) or at least ${config.reviewFilterMinBadPoints} (Review threshold).` : "Trigger removal if an item earns this many bad points. 0 turns this off."}
                        min={0} max={16} 
                        value={config.removeFilterMinBadPoints} 
                        onChange={(v) => {
                          if (config.enableReviewFilter && v > 0 && v < config.reviewFilterMinBadPoints) update('removeFilterMinBadPoints', config.reviewFilterMinBadPoints);
                          else update('removeFilterMinBadPoints', v);
                        }} 
                      />
                      <Slider 
                        label="Category Threshold" 
                        description={config.enableReviewFilter ? `Must be 0 (off) or at least ${config.reviewFilterCategories} (Review threshold).` : "Trigger removal if an item hits this many categories. 0 turns this off."}
                        min={0} max={6} 
                        value={config.removeFilterCategories} 
                        onChange={(v) => {
                          if (config.enableReviewFilter && v > 0 && v < config.reviewFilterCategories) update('removeFilterCategories', config.reviewFilterCategories);
                          else update('removeFilterCategories', v);
                        }} 
                      />

                      <div className="flex flex-col gap-3 pt-2">
                        <label className="flex items-center gap-3 text-sm text-slate-300 cursor-pointer hover:text-white transition-colors">
                          <input type="checkbox" checked={config.removeIgnoreModerators} onChange={e => update('removeIgnoreModerators', e.target.checked)} className="w-4 h-4 rounded border-slate-600 bg-slate-900 accent-blue-500" />
                          Ignore moderators from removal
                        </label>
                        <label className="flex items-center gap-3 text-sm text-slate-300 cursor-pointer hover:text-white transition-colors">
                          <input type="checkbox" checked={config.removeIgnoreApprovedUsers} onChange={e => update('removeIgnoreApprovedUsers', e.target.checked)} className="w-4 h-4 rounded border-slate-600 bg-slate-900 accent-blue-500" />
                          Ignore approved users from removal
                        </label>
                      </div>
                    </div>
                  )}
                </div>

                <Toggle 
                  label="Update Reputation Mod Notes" 
                  description="Keeps one compact RFstats mod note per user and refreshes it when their score changes."
                  checked={config.updateReputationModNotes} 
                  onChange={(v) => update('updateReputationModNotes', v)} 
                />
              </div>
            );

          case 'verify':
            const canRestore = config.verificationRemovePostsUntilVerified || config.verificationRemoveCommentsUntilVerified;
            return (
              <div className="space-y-6">
                <div className="mb-8">
                  <h3 className="text-xl font-bold text-white mb-2">Stop Bots & Trolls</h3>
                  <p className="text-slate-400">Require suspicious accounts to verify they are human.</p>
                </div>

                <Toggle label="Enable Human Verification" description="Unlocks the verification challenge system." checked={config.enableHumanVerification} onChange={(v) => update('enableHumanVerification', v)} />

                {config.enableHumanVerification && (
                  <div className="space-y-4 pl-4 border-l-2 border-blue-500/30 ml-4 animate-in fade-in">
                    
                    <div className="p-4 rounded-xl border border-slate-700 bg-slate-800/50">
                      <h4 className="font-semibold text-slate-200 mb-2">Remind Unverified Users That Post or Comment</h4>
                      <RadioGroup 
                        selected={config.humanVerificationReminderInterval} 
                        onChange={(v) => update('humanVerificationReminderInterval', v)}
                        options={[
                          { value: 'never', label: 'Never' },
                          { value: '12h', label: 'Every 12h' },
                          { value: '1d', label: 'Daily' },
                          { value: '1w', label: 'Weekly' }
                        ]} 
                      />
                    </div>

                    <Toggle label="Block Posts Until Verified" checked={config.verificationRemovePostsUntilVerified} onChange={(v) => update('verificationRemovePostsUntilVerified', v)} />
                    <Toggle label="Block Comments Until Verified" checked={config.verificationRemoveCommentsUntilVerified} onChange={(v) => update('verificationRemoveCommentsUntilVerified', v)} />

                    {canRestore && (
                      <div className="space-y-4">
                        <Toggle label="Auto-Restore Content After Verification" description="If they verify, their verification-blocked content will automatically become visible again." checked={config.approveVerificationRemovedWhenVerified} onChange={(v) => update('approveVerificationRemovedWhenVerified', v)} />
                        
                        {config.approveVerificationRemovedWhenVerified && (
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pl-4 border-l-2 border-blue-500/30 ml-4 animate-in fade-in">
                            <Slider label="Max Restored Posts" min={1} max={3} value={config.approveVerificationRemovedPostLimit} onChange={(v) => update('approveVerificationRemovedPostLimit', v)} />
                            <Slider label="Max Restored Comments" min={1} max={10} value={config.approveVerificationRemovedCommentLimit} onChange={(v) => update('approveVerificationRemovedCommentLimit', v)} />
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}
              </div>
            );

          case 'emoji':
            const cleanName = cleanSubredditName(config.subredditName);
            const emojiUrl = cleanName ? `https://www.reddit.com/mod/${cleanName}/emojis` : '';

            return (
              <div className="space-y-6">
                <div className="mb-8">
                  <h3 className="text-xl font-bold text-white mb-2">Install the Verification Badge</h3>
                  <p className="text-slate-400">Because you enabled Human Verification, you need to add the special badge icon to your subreddit emojis.</p>
                </div>

                <div className="flex flex-col sm:flex-row gap-4 items-start">
                  <button 
                    onClick={() => emojiUrl && window.open(emojiUrl, '_blank', 'noopener')}
                    disabled={!emojiUrl}
                    className="flex items-center justify-center px-6 py-3 rounded-lg bg-blue-600 text-white font-semibold hover:bg-blue-500 disabled:opacity-50 disabled:hover:bg-blue-600 transition-colors w-full sm:w-auto"
                  >
                    Open Emoji Settings
                  </button>
                  <a href={vrfData} download="vrf.png" className="flex items-center justify-center gap-2 px-6 py-3 rounded-lg border border-slate-700 bg-blue-600/20 hover:bg-blue-600/30 text-blue-300 font-medium transition-colors w-full sm:w-auto">
                    <ImageIcon size={18} /> Download "vrf.png" Badge
                  </a>
                </div>

                <div className="p-5 rounded-xl border border-slate-700 bg-slate-800/50 mt-6">
                  <h4 className="font-semibold text-slate-200 mb-3">Do these in order:</h4>
                  <ul className="list-decimal pl-5 text-slate-300 space-y-2 text-sm">
                    <li>Turn <b>Emoji</b> on for the subreddit.</li>
                    <li>Download the badge above.</li>
                    <li>Press the <b>Add Emoji</b> button.</li>
                    <li>Upload the downloaded badge image.</li>
                    <li>Name the emoji <b>vrf</b> (all lowercase, nothing else).</li>
                    <li>Turn <b>User flair</b> ON.</li>
                    <li>Turn <b>Mod only</b> ON.</li>
                    <li>Leave <b>Post flair</b> OFF.</li>
                  </ul>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                  <div className="p-4 rounded-xl border border-slate-700 bg-slate-800/50 flex flex-col items-center">
                    <h4 className="font-semibold text-slate-200 mb-3 text-center">Step 1 — Enable Custom Emoji</h4>
                    <img src={enableEmojiData} alt="Enable emoji screenshot" className="w-full rounded-lg border border-slate-700 shadow-md mb-3" />
                  </div>
                  <div className="p-4 rounded-xl border border-slate-700 bg-slate-800/50 flex flex-col items-center">
                    <h4 className="font-semibold text-slate-200 mb-3 text-center">Step 2 — Add the vrf badge</h4>
                    <img src={vrfSettingsData} alt="VRF emoji settings screenshot" className="w-full rounded-lg border border-slate-700 shadow-md mb-3" />
                  </div>
                </div>
              </div>
            );

          case 'export':
            const exportObj = {
              enableHighTrafficMode: config.enableHighTrafficMode,
              customBadTerms: config.customBadTerms,
              updateReputationModNotes: config.updateReputationModNotes,
              negativeScoreFade: config.negativeScoreFade,
              streakMode: config.streakMode,
              threshRegular: config.threshRegular,
              threshPro: config.threshPro,
              threshElite: config.threshElite,
              protectOpSelfReplies: config.protectOpSelfReplies,
              ownPostCommentGoodCap: config.protectOpSelfReplies ? config.ownPostCommentGoodCap : 3,
              enableFlairUpdates: config.enableFlairUpdates,
            };

            if (config.enableFlairUpdates) {
              exportObj.preserveCustomFlairText = config.preserveCustomFlairText;
              exportObj.showPostCommentCount = config.flairParts.includes('activity');
              exportObj.colorFlairByReputation = config.colorFlairByReputation;
              exportObj.flairParts = config.flairParts.filter(p => p !== 'head' || config.preserveCustomFlairText);
            }

            exportObj.enableReviewFilter = config.enableReviewFilter;
            if (config.enableReviewFilter) {
              exportObj.reviewFilterMinBadPoints = config.reviewFilterMinBadPoints;
              exportObj.reviewFilterCategories = config.reviewFilterCategories;
              exportObj.ignoreModerators = config.ignoreModerators;
              exportObj.ignoreApprovedUsers = config.ignoreApprovedUsers;
            }

            exportObj.enableRemoveFilter = config.enableRemoveFilter;
            if (config.enableRemoveFilter) {
              exportObj.removeFilterMinBadPoints = config.removeFilterMinBadPoints;
              exportObj.removeFilterCategories = config.removeFilterCategories;
              exportObj.removeIgnoreModerators = config.removeIgnoreModerators;
              exportObj.removeIgnoreApprovedUsers = config.removeIgnoreApprovedUsers;
            }

            exportObj.enableHumanVerification = config.enableHumanVerification;
            if (config.enableHumanVerification) {
              exportObj.enableVerifyHumanMenu = true;
              exportObj.enableHumanVerificationReminder = config.humanVerificationReminderInterval !== 'never';
              if (config.humanVerificationReminderInterval !== 'never') {
                exportObj.humanVerificationReminderInterval = config.humanVerificationReminderInterval;
              }
              exportObj.verificationRemovePostsUntilVerified = config.verificationRemovePostsUntilVerified;
              exportObj.verificationRemoveCommentsUntilVerified = config.verificationRemoveCommentsUntilVerified;
              
              if (config.approveVerificationRemovedWhenVerified && (config.verificationRemovePostsUntilVerified || config.verificationRemoveCommentsUntilVerified)) {
                exportObj.approveVerificationRemovedWhenVerified = true;
                exportObj.approveVerificationRemovedPostLimit = config.approveVerificationRemovedPostLimit;
                exportObj.approveVerificationRemovedCommentLimit = config.approveVerificationRemovedCommentLimit;
              }
            }

            const jsonString = JSON.stringify(exportObj, null, 2);

            const handleCopy = () => {
              const copyToClipboardFallback = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                  document.execCommand('copy');
                  setCopied('Copied!');
                  setTimeout(() => setCopied(''), 2000);
                } catch (error) {
                  console.error('Fallback copy failed', error);
                  setCopied('Failed to copy');
                  setTimeout(() => setCopied(''), 2000);
                }
                textArea.remove();
              };

              if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(jsonString).then(() => {
                  setCopied('Copied!');
                  setTimeout(() => setCopied(''), 2000);
                }).catch(() => {
                  copyToClipboardFallback(jsonString);
                });
              } else {
                copyToClipboardFallback(jsonString);
              }
            };

            const installLink = `https://developers.reddit.com/r/${config.subredditName || 'YOUR_SUBREDDIT_NAME'}/apps/reputation-flair`;

            return (
              <div className="space-y-6">
                <div className="text-center mb-8">
                  <div className="w-16 h-16 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-4">
                    <CheckCircle2 size={32} />
                  </div>
                  <h3 className="text-2xl font-bold text-white mb-2">You're all set!</h3>
                  <p className="text-slate-400">Copy the configuration below and paste it into your bot settings.</p>
                </div>

                <div className="relative">
                  <div className="absolute top-3 right-3">
                    <button 
                      onClick={handleCopy}
                      className="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium transition-colors"
                    >
                      {copied ? <CheckCircle2 size={16} /> : <Copy size={16} />}
                      {copied || 'Copy JSON'}
                    </button>
                  </div>
                  <pre className="p-6 rounded-xl bg-slate-950 border border-slate-800 text-sm text-green-400 font-mono overflow-auto max-h-[400px] scrollbar-thin scrollbar-thumb-slate-700">{jsonString}</pre>
                </div>

                <div className="mt-8 p-6 rounded-xl border border-blue-500/30 bg-blue-500/10 text-center">
                  <h4 className="font-semibold text-blue-100 mb-2">Ready to Install?</h4>
                  <p className="text-sm text-blue-200/70 mb-4">Click the link below to apply your new configuration in Devvit:</p>
                  <a href={installLink} target="_blank" rel="noopener noreferrer" className="text-blue-400 hover:text-blue-300 font-mono break-all underline text-sm">
                    {installLink}
                  </a>
                </div>
              </div>
            );

          default:
            return null;
        }
      };

      const isNextDisabled = step === 0 && !config.subredditName;

      return (
        <div className="min-h-screen bg-slate-900 text-slate-200 font-sans p-4 sm:p-8 flex flex-col items-center justify-center">
          <div className="w-full max-w-3xl">
            
            {/* Progress Bar */}
            <div className="flex items-center justify-between mb-8 relative">
              <div className="absolute left-0 top-1/2 -translate-y-1/2 w-full h-1 bg-slate-800 rounded-full z-0"></div>
              <div 
                className="absolute left-0 top-1/2 -translate-y-1/2 h-1 bg-blue-500 rounded-full z-0 transition-all duration-500"
                style={{ width: `${(step / (steps.length - 1)) * 100}%` }}
              ></div>
              
              {steps.map((s, i) => {
                const Icon = s.icon;
                const isActive = i === step;
                const isPast = i < step;
                return (
                  <div key={s.id} className={`relative z-10 flex flex-col items-center gap-2 transition-colors duration-300 ${isActive ? 'text-blue-400' : isPast ? 'text-blue-500' : 'text-slate-600'}`}>
                    <div className={`w-10 h-10 rounded-full flex items-center justify-center border-2 transition-all duration-300 ${isActive ? 'bg-slate-900 border-blue-400 scale-110 shadow-[0_0_15px_rgba(59,130,246,0.5)]' : isPast ? 'bg-blue-500 border-blue-500 text-slate-900' : 'bg-slate-900 border-slate-700'}`}>
                      <Icon size={18} />
                    </div>
                    <span className="text-xs font-semibold hidden sm:block absolute -bottom-6 w-24 text-center">{s.title}</span>
                  </div>
                );
              })}
            </div>

            {/* Main Card */}
            <div className="bg-slate-800/40 backdrop-blur-xl border border-slate-700/60 rounded-3xl p-6 sm:p-10 shadow-2xl mb-8 sm:mt-12 min-h-[450px] flex flex-col">
              <div className="flex-1">
                {getStepContent()}
              </div>
            </div>

            {/* Navigation */}
            <div className="flex items-center justify-between px-2">
              <button
                onClick={() => setStep(s => Math.max(0, s - 1))}
                className={`flex items-center gap-2 px-5 py-2.5 rounded-xl font-medium transition-all ${step === 0 ? 'opacity-0 pointer-events-none' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}
              >
                <ChevronLeft size={18} /> Back
              </button>
              
              {step < steps.length - 1 && (
                <button
                  onClick={() => setStep(s => Math.min(steps.length - 1, s + 1))}
                  disabled={isNextDisabled}
                  className={`flex items-center gap-2 px-6 py-2.5 rounded-xl font-bold transition-all ${isNextDisabled ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-500 hover:shadow-[0_0_20px_rgba(59,130,246,0.4)]'}`}
                >
                  Next Step <ChevronRight size={18} />
                </button>
              )}
            </div>

          </div>
        </div>
      );
    }

    // --- Render App ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
